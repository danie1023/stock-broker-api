<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PrimeTrade • Stock Broker</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <style>
    body { font-family: 'Inter', system-ui, sans-serif; }
    .ticker { animation: scroll 40s linear infinite; }
    @keyframes scroll { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
  </style>
</head>
<body class="bg-zinc-950 text-white min-h-screen">

  <!-- Navbar -->
  <nav class="bg-black border-b border-zinc-800 sticky top-0 z-50">
    <div class="max-w-screen-2xl mx-auto px-6 py-5 flex justify-between items-center">
      <div class="flex items-center gap-10">
        <div class="flex items-center gap-3">
          <span class="text-4xl font-black text-emerald-500">PT</span>
          <h1 class="text-2xl font-semibold">PrimeTrade</h1>
        </div>
        <div class="hidden md:flex gap-8 text-sm font-medium">
          <a href="#" class="hover:text-emerald-400">Markets</a>
          <a href="#" class="hover:text-emerald-400">Portfolio</a>
          <a href="#" class="hover:text-emerald-400">Trade</a>
          <a href="#" class="hover:text-emerald-400">Watchlist</a>
        </div>
      </div>
      <button onclick="alert('Open Account flow coming soon')" class="bg-emerald-500 hover:bg-emerald-600 px-6 py-3 rounded-2xl font-medium">Open Free Account</button>
    </div>
  </nav>

  <!-- Ticker -->
  <div class="bg-zinc-900 py-3 border-b border-zinc-700 overflow-hidden">
    <div id="ticker" class="ticker flex whitespace-nowrap text-emerald-400 text-sm font-medium"></div>
  </div>

  <div class="max-w-screen-2xl mx-auto px-6 py-10">
    <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
      <div class="lg:col-span-8 bg-zinc-900 rounded-3xl p-8">
        <div class="flex justify-between mb-8">
          <div>
            <h1 class="text-5xl font-bold">AAPL</h1>
            <p class="text-4xl text-emerald-400">$226.84</p>
          </div>
          <p class="text-emerald-400 text-2xl">+2.17% Today</p>
        </div>
        <canvas id="priceChart" height="260"></canvas>
      </div>

      <div class="lg:col-span-4 bg-zinc-900 rounded-3xl p-8">
        <h3 class="text-xl font-semibold mb-6">Quick Trade</h3>
        <input id="symbol" value="AAPL" class="w-full bg-zinc-800 rounded-2xl px-6 py-5 mb-4">
        <input id="qty" type="number" value="10" class="w-full bg-zinc-800 rounded-2xl px-6 py-5 mb-8">
        <button onclick="placeOrder()" class="w-full bg-emerald-500 hover:bg-emerald-600 py-7 rounded-3xl text-lg font-semibold">BUY NOW</button>
      </div>
    </div>
  </div>

  <script>
    const stocks = ["AAPL +2.34% • TSLA -1.45% • NVDA +4.67% • MSFT +0.89% • AMZN -0.67% • "];
    document.getElementById('ticker').innerHTML = stocks.join('') + stocks.join('');

    new Chart(document.getElementById('priceChart'), {
      type: 'line',
      data: {
        labels: ['9:30','10:00','11:00','12:00','13:00','14:00','15:00','16:00'],
        datasets: [{ data: [218,221,224,223,225,228,227,226.84], borderColor: '#10b981', tension: 0.4, borderWidth: 3 }]
      },
      options: { plugins: { legend: { display: false }}, scales: { y: { grid: { color: '#3f3f46' }}, x: { grid: { color: '#3f3f46' }}}}
    });

    function placeOrder() {
      alert("✅ Order Placed Successfully!");
    }
  </script>
</body>
</html>
